name: Deploy — Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff

      # ── Railway production ────────────────────────────────────
      - name: Deploy backend to Railway production
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: npx @railway/cli@latest up --service ${{ secrets.RAILWAY_SERVICE_ID_PROD }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}

      # ── Vercel production (con --prod) ────────────────────────
      - name: Deploy web-admin to Vercel production
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            npx vercel@54.6.1 pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
            npx vercel@54.6.1 build --prod --token ${{ secrets.VERCEL_TOKEN }}
            npx vercel@54.6.1 deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      - name: Deploy web-cliente to Vercel production
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            npx vercel@54.6.1 pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
            npx vercel@54.6.1 build --prod --token ${{ secrets.VERCEL_TOKEN }}
            npx vercel@54.6.1 deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLIENTE }}

      - name: Deploy web-staff to Vercel production
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            npx vercel@54.6.1 pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
            npx vercel@54.6.1 build --prod --token ${{ secrets.VERCEL_TOKEN }}
            npx vercel@54.6.1 deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAFF }}
