name: Deploy — Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo build --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff

      # ── Railway staging ──────────────────────────────────────
      - name: Deploy backend to Railway staging
        run: npx @railway/cli@latest up --service ${{ secrets.RAILWAY_SERVICE_ID_STAGING }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      # ── Vercel staging (preview, sin --prod) ─────────────────
      - name: Deploy web-admin to Vercel staging
        run: |
          npx vercel pull --yes --environment=preview --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel build --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      - name: Deploy web-cliente to Vercel staging
        run: |
          npx vercel pull --yes --environment=preview --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel build --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLIENTE }}

      - name: Deploy web-staff to Vercel staging
        run: |
          npx vercel pull --yes --environment=preview --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel build --token ${{ secrets.VERCEL_TOKEN }}
          npx vercel deploy --prebuilt --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAFF }}