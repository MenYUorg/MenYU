name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI — typecheck, lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @menyu/api exec prisma generate
        env:
          DATABASE_URL: "postgresql://x:x@x:5432/x"
          DIRECT_URL: "postgresql://x:x@x:5432/x"

      - name: Typecheck
        run: pnpm turbo typecheck --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff

      - name: Lint
        run: pnpm turbo lint --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff

      - name: Test
        run: pnpm turbo test --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff

      - name: Coverage (informativo)
        run: pnpm turbo test:coverage --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff
        continue-on-error: true

      - name: Upload coverage — backend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend
          path: apps/backend/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage — web-admin
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-web-admin
          path: apps/web-admin/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage — web-cliente
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-web-cliente
          path: apps/web-cliente/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage — web-staff
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-web-staff
          path: apps/web-staff/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm turbo build --filter=@menyu/api --filter=@menyu/web-admin --filter=@menyu/web-cliente --filter=@menyu/web-staff
